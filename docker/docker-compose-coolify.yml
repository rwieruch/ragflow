services:
  es01:
    image: elasticsearch:${STACK_VERSION:-8.11.3}
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    environment:
      - node.name=es01
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=false
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=5gb
      - cluster.routing.allocation.disk.watermark.high=3gb
      - cluster.routing.allocation.disk.watermark.flood_stage=2gb
    mem_limit: ${MEM_LIMIT:-8073741824}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 120
    networks:
      - ragflow
    restart: unless-stopped

  mysql:
    image: mysql:8.0.39
    command:
      --max_connections=1000
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --tls_version="TLSv1.2,TLSv1.3"
      --binlog_expire_logs_seconds=604800
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DBNAME:-rag_flow}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ragflow
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: ["server", "--console-address", ":9001", "/data"]
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-rag_flow}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - ragflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 120

  redis:
    image: valkey/valkey:8
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - ragflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 120

  ragflow:
    depends_on:
      mysql:
        condition: service_healthy
    image: ${RAGFLOW_IMAGE:-infiniflow/ragflow:v0.24.0}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        cat > /etc/nginx/nginx.conf << 'NGINXEOF'
        user  root;
        worker_processes  auto;
        error_log  /var/log/nginx/error.log notice;
        pid        /var/run/nginx.pid;
        events {
            worker_connections  1024;
        }
        http {
            include       /etc/nginx/mime.types;
            default_type  application/octet-stream;
            log_format  main  '$$remote_addr - $$remote_user [$$time_local] "$$request" '
                              '$$status $$body_bytes_sent "$$http_referer" '
                              '"$$http_user_agent" "$$http_x_forwarded_for"';
            access_log  /var/log/nginx/access.log  main;
            sendfile        on;
            keepalive_timeout  65;
            client_max_body_size 1024M;
            include /etc/nginx/conf.d/ragflow.conf;
        }
        NGINXEOF

        cat > /etc/nginx/conf.d/ragflow.conf << 'RAGFLOWEOF'
        server {
            listen 80;
            server_name _;
            root /ragflow/web/dist;
            gzip on;
            gzip_min_length 1k;
            gzip_comp_level 9;
            gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
            gzip_vary on;
            gzip_disable "MSIE [1-6]\.";
            location ~ ^/api/v1/admin {
                proxy_pass http://localhost:9381;
                include proxy.conf;
            }
            location ~ ^/(v1|api) {
                proxy_pass http://localhost:9380;
                include proxy.conf;
            }
            location / {
                index index.html;
                try_files $$uri $$uri/ /index.html;
            }
            location ~ ^/static/(css|js|media)/ {
                expires 10y;
                access_log off;
            }
        }
        RAGFLOWEOF

        cat > /etc/nginx/proxy.conf << 'PROXYEOF'
        proxy_set_header Host $$host;
        proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $$scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffer_size 1024k;
        proxy_buffers 16 1024k;
        proxy_busy_buffers_size 2048k;
        proxy_temp_file_write_size 2048k;
        PROXYEOF

        exec ./entrypoint.sh --enable-adminserver
    ports:
      - "80"
    labels:
      - coolify.managed=true
      - coolify.proxy=true
      - coolify.port=80
    volumes:
      - ragflow_logs:/ragflow/logs
    environment:
      - TZ=${TZ:-Europe/Berlin}
      - DOC_ENGINE=${DOC_ENGINE:-elasticsearch}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DBNAME=${MYSQL_DBNAME:-rag_flow}
      - MYSQL_MAX_PACKET=${MYSQL_MAX_PACKET:-1073741824}
      - ES_HOST=es01
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - MINIO_HOST=minio
      - MINIO_USER=${MINIO_USER:-rag_flow}
      - MINIO_PASSWORD=${MINIO_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DOC_BULK_SIZE=${DOC_BULK_SIZE:-4}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-16}
      - REGISTER_ENABLED=${REGISTER_ENABLED:-1}
      - THREAD_POOL_MAX_WORKERS=${THREAD_POOL_MAX_WORKERS:-128}
      - DISABLE_PASSWORD_LOGIN=${DISABLE_PASSWORD_LOGIN:-false}
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
      - USE_DOCLING=${USE_DOCLING:-false}
      - MAX_CONTENT_LENGTH=${MAX_CONTENT_LENGTH:-1073741824}
    networks:
      - ragflow
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  esdata01:
    driver: local
  mysql_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  ragflow_logs:
    driver: local

networks:
  ragflow:
    driver: bridge
